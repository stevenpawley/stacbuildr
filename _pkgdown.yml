url: https://stevenpawley.github.io/stacbuildr/
template:
  bootstrap: 5

articles:
  - title: "Articles"
    navbar: ~
    contents:
      - stac-catalog
      - pystac

reference:
  - title: "Overview"
    contents:
      - stacbuildr-package

  - title: "Core STAC Objects"
    desc: "Create and manipulate the three fundamental STAC object types."
    contents:
      - stac_catalog
      - stac_collection
      - stac_item

  - title: "Assets"
    desc: "Create and attach data assets to STAC Items and Collections."
    contents:
      - stac_asset
      - add_asset

  - title: "Links"
    desc: "Build and manage the link graph between STAC objects."
    contents:
      - add_link
      - add_self_link
      - add_root_link
      - add_parent_link
      - add_child
      - add_item
      - get_children
      - get_items
      - get_item_links
      - count_items
      - remove_item

  - title: "Collection Metadata Helpers"
    desc: "Helper constructors for Collection fields."
    contents:
      - stac_extent
      - stac_provider
      - stac_summaries
      - extent_from_items
      - add_item_assets

  - title: "stars Integration"
    desc: >
      Create STAC Items and preview/thumbnails directly from `stars` raster objects,
      and extract band metadata.
    contents:
      - item_from_stars
      - bands_from_stars
      - items_from_directory
      - preview_from_stars

  - title: "sf Integration"
    desc: "Create STAC Items and thumbnails from `sf` vector objects."
    contents:
      - item_from_sf
      - geometry_from_sf
      - bbox_from_sf
      - thumbnail_from_sf

  - title: "Raster Extension"
    desc: >
      Add the STAC Raster Extension to Items and build per-band metadata
      objects.
    contents:
      - add_raster_extension
      - raster_band
      - raster_statistics
      - raster_histogram
      - raster_from_file

  - title: "EO Extension"
    desc: >
      Add the STAC Electro-Optical Extension to Items, with pre-built band
      definitions for common sensors.
    contents:
      - add_eo_extension
      - eo_band
      - print.eo_band
      - landsat_oli_bands
      - sentinel2_msi_bands

  - title: "Classification Extension"
    desc: >
      Add the STAC Classification Extension to Items
    contents:
      - add_classification_extension
      - classification_class
      - classification_bitfield
      - print.classification_class
      - print.classification_bitfield

  - title: "Scientific Citation Extension"
    desc: >
      Add the STAC Scientific Citation Extension to Items, recording the DOI,
      human-readable citation, and related publications for a dataset.
    contents:
      - add_scientific_extension
      - scientific_publication
      - print.scientific_publication

  - title: "Read / Write"
    desc: "Serialise STAC objects to JSON on disk and read them back."
    contents:
      - write_stac
      - write_catalog
      - write_item
      - read_stac

  - title: "Validation"
    desc: >
      Validate STAC objects against the specification. `validate_stac()` applies
      fast, offline structural checks. `validate_stac_schema()` validates against
      the official JSON Schemas hosted at `schemas.stacspec.org` (requires
      network access and the `jsonvalidate` package).
    contents:
      - validate_stac
      - validate_stac_schema

  - title: "Database Backend"
    desc: >
      Set up and manage a PostgreSQL/PostGIS database backing store for
      STAC Collections and Items.
    contents:
      - stac_db_setup
      - stac_db_insert_collection
      - stac_db_insert_item
      - stac_db_delete_collection
      - stac_db_delete_item

  - title: "STAC API Server"
    desc: >
      Serve a STAC API 1.0 compliant HTTP API via `plumber`, backed by the
      PostgreSQL database. Includes asset signing helpers for Azure Blob Storage.
    contents:
      - stac_api_router
      - sign_azure_ad
